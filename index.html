<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>萝卜的博客</title>

  <!-- favicon -->
  <link rel="icon" href="Content/icon/carrot.png" type="image/png">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #f0f0f0;
    }

    /* 顶图 */
    .top-banner {
      width: 100%;
      height: 300px;
      background-image: url('Content/Images/qing.jpg');
      background-size: cover;
      background-position: center;
      position: relative;
    }

    /* 横栏容器 */
    .columns {
      display: flex;
      justify-content: space-around;
      position: relative;
      margin-top: 20px; /* 顶图下面 */
      padding: 0 20px;
      box-sizing: border-box;
      gap: 10px;
    }

    /* 横栏按钮 */
    .collapsible {
      flex: 1;
      padding: 15px;
      background-color: rgba(255, 255, 255, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-radius: 10px;
      text-align: center;
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: transform 0.2s, background-color 0.2s;
    }

    .collapsible:hover {
      transform: scale(1.05);
      background-color: rgba(255, 255, 255, 0.4);
    }

    /* 折叠内容 */
    .content {
      display: none; 
      margin-top: 10px;
      padding: 10px;
      background-color: rgba(255,255,255,0.3);
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 10px;
      color: #fff;
      backdrop-filter: blur(5px);
      width: 100%;
    }

    /* 每个横栏+内容包裹 */
    .column-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>

  <!-- 顶图 -->
  <div class="top-banner"></div>

  <!-- 横栏 -->
  <div class="columns">
    <div class="column-wrapper">
      <div class="collapsible">一</div>
      <div class="content">
        <p>这里是栏目一的内容，可以写文字或图片。</p>
      </div>
    </div>

    <div class="column-wrapper">
      <div class="collapsible">二</div>
      <div class="content">
        <p>这里是栏目二的内容。</p>
      </div>
    </div>

    <div class="column-wrapper">
      <div class="collapsible">三</div>
      <div class="content">
        <p>这里是栏目三的内容。</p>
      </div>
    </div>

    <div class="column-wrapper">
      <div class="collapsible">四</div>
      <div class="content">
        <p>这里是栏目四的内容。</p>
      </div>
    </div>
  </div>

  <script>
    const collapsibles = document.querySelectorAll(".collapsible");
    collapsibles.forEach(btn => {
      btn.addEventListener("click", function() {
        const content = this.nextElementSibling;
        if (content.style.display === "block") {
          content.style.display = "none";
        } else {
          content.style.display = "block";
        }
      });
    });
  </script>

</body>
</html>
