<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>萝卜的博客</title>

  <!-- favicon 图标 -->
  <link rel="icon" href="Content/Icon/carrot.png" type="image/png">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #f0f0f0;
    }

    /* 顶图 */
    .top-banner {
      width: 100%;
      height: 300px;
      background-image: url('Content/Images/qing.jpg'); /* 顶图路径 */
      background-size: cover;
      background-position: center;
      position: relative;
    }

    /* 横向栏目容器 */
    .columns {
      display: flex;                   /* 横向排列 */
      justify-content: space-around;   /* 平均分布 */
      position: absolute;              /* 顶图上方显示 */
      top: 250px;                      /* 顶图高度下方，可微调 */
      width: 100%;
      padding: 0 20px;
      box-sizing: border-box;
    }

    /* 每个栏目 */
    .column {
      flex: 1;                 
      margin: 0 10px;
      padding: 15px;
      background-color: rgba(255, 255, 255, 0.3); /* 半透明 */
      border: 2px solid rgba(255, 255, 255, 0.6); /* 半透明边框 */
      border-radius: 10px;
      text-align: center;
      color: #fff;
      backdrop-filter: blur(5px);     /* 背景模糊材质感 */
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
    }

    .column:hover {
      transform: scale(1.05);
      background-color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>

  <!-- 顶图 -->
  <div class="top-banner"></div>

  <!-- 横向栏目 -->
  <div class="columns">
    <div class="column">一</div>
    <div class="column">二</div>
    <div class="column">三</div>
    <div class="column">四</div>
  </div>

</body>
</html>
