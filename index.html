<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>白雪儿的博客</title>
<style>
  body { font-family: sans-serif; margin:0; }

  /* 顶图 */
  .top-banner {
    width: 100%;
    height: 300px;
    background-image: url('mother.png'); /* 顶图 */
    background-size: cover;
    background-position: center;
    margin-bottom: 20px;
  }

  /* 栏目容器 */
  .tab-header {
    display: flex;
    justify-content: space-around;
    background-color: #f0f0f0;
    border-bottom: 2px solid #ccc;
  }

  /* 每个栏目按钮 */
  .tab-header button {
    flex: 1;
    padding: 15px;
    border: none;
    background-color: #f0f0f0;
    cursor: pointer;
    font-size: 18px;
    border-radius: 50px 50px 0 0; /* 封闭的圆角 */
    transition: all 0.3s;
  }

  /* 当前选中栏目 */
  .tab-header button.active {
    background-color: #fff;
    border-bottom: 2px solid #fff; /* 看起来连到内容区 */
    font-weight: bold;
  }

  /* 内容区 */
  .tab-content {
    display: none;
    padding: 20px;
    border: 2px solid #ccc;
    border-top: none; /* 视觉上和栏目连起来 */
    background-color: #fff;
  }

  /* 显示当前内容 */
  .tab-content.active {
    display: block;
  }
</style>
</head>
<body>

<div class="top-banner"></div>

<div class="tab-header">
  <button class="tab-btn active" data-tab="tab1">一</button>
  <button class="tab-btn" data-tab="tab2">二</button>
  <button class="tab-btn" data-tab="tab3">三</button>
  <button class="tab-btn" data-tab="tab4">四</button>
</div>

<div id="tab1" class="tab-content active">
  <p>这里是栏目一的内容，可以放文字、图片等。</p>
</div>
<div id="tab2" class="tab-content">
  <p>这里是栏目二的内容。</p>
</div>
<div id="tab3" class="tab-content">
  <p>这里是栏目三的内容。</p>
</div>
<div id="tab4" class="tab-content">
  <p>这里是栏目四的内容。</p>
</div>

<script>
const buttons = document.querySelectorAll('.tab-btn');
const contents = document.querySelectorAll('.tab-content');

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    // 清除其他按钮和内容的 active
    buttons.forEach(b => b.classList.remove('active'));
    contents.forEach(c => c.classList.remove('active'));

    // 激活当前点击的按钮和对应内容
    btn.classList.add('active');
    const tabId = btn.getAttribute('data-tab');
    document.getElementById(tabId).classList.add('active');
  });
});
</script>

</body>
</html>
