<script>
// ❄ 下雪效果（requestAnimationFrame）
const snowflakes = [];
const maxSnowflakes = 100;

function createSnowflake() {
  const snow = document.createElement("div");
  snow.classList.add("snowflake");
  snow.innerText = "❄";
  snow.style.left = Math.random() * 100 + "vw";
  snow.style.fontSize = (Math.random() * 12 + 8) + "px";
  snow.style.opacity = Math.random();
  snow.dataset.speed = (Math.random() * 2 + 1); // 下落速度
  snow.dataset.angle = Math.random() * Math.PI * 2; // X 摆动角度
  snow.dataset.offset = 0;
  document.body.appendChild(snow);
  snowflakes.push(snow);
}

function updateSnowflakes() {
  snowflakes.forEach((snow, i) => {
    let top = parseFloat(snow.style.top || "-10px") + parseFloat(snow.dataset.speed);
    snow.dataset.offset += 0.02;
    let xOffset = Math.sin(snow.dataset.offset) * 20;
    snow.style.transform = `translateX(${xOffset}px) rotate(${top * 3}deg)`;
    snow.style.top = top + "px";

    if (top > window.innerHeight) {
      snow.remove();
      snowflakes.splice(i, 1);
      createSnowflake();
    }
  });
  requestAnimationFrame(updateSnowflakes);
}

// 初始化雪花
for (let i = 0; i < 50; i++) createSnowflake();
updateSnowflakes();

// Tab 切换逻辑保持不变
const buttons = document.querySelectorAll('.tab-btn');
const contents = document.querySelectorAll('.tab-content');
const loadedTabs = {};

const headerImages = [
  "Content/Images/header-image-1.png","Content/Images/header-image-2.png",
  "Content/Images/header-image-3.png","Content/Images/header-image-4.png",
  "Content/Images/header-image-5.png","Content/Images/header-image-6.png",
  "Content/Images/header-image-7.png","Content/Images/header-image-8.png",
  "Content/Images/header-image-9.png","Content/Images/header-image-10.png"
];
const headerEl = document.querySelector(".top-banner");
if(headerEl && headerImages.length){
  const idx = Math.floor(Math.random() * headerImages.length);
  headerEl.style.backgroundImage = `url('${headerImages[idx]}')`;
}

function openTab(tabId){
  contents.forEach(c=>c.classList.remove('active'));
  buttons.forEach(b=>b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');

  if(!loadedTabs[tabId]){
    loadTabHTML(tabId).then(()=>{ observeTOC(tabId); });
    loadedTabs[tabId] = true;
  } else {
    generateSidebarTOC(tabId);
  }
  location.hash = tabId;
}

buttons.forEach(btn=>btn.addEventListener('click',()=>{ 
  openTab(btn.getAttribute('data-tab')); 
}));

function loadTabHTML(tabId){
  const tabFiles = { tab1:"articles/About.html", tab2:"articles/Demo.html", tab3:"articles/Share.html", tab4:"articles/Recommend.html" };
  const url = tabFiles[tabId];
  if(!url) return Promise.resolve();

  return fetch(url)
    .then(res=>res.text())
    .then(html=>{ document.getElementById(tabId).innerHTML = html; })
    .catch(err=>{ document.getElementById(tabId).innerHTML="<p>加载失败……</p>"; });
}

// MutationObserver 监听文章加载完成生成 TOC
function observeTOC(tabId){
  const tabContent = document.getElementById(tabId);
  const observer = new MutationObserver(() => { generateSidebarTOC(tabId); observer.disconnect(); });
  observer.observe(tabContent, { childList:true, subtree:true });
}

// 生成目录
function generateSidebarTOC(tabId){
  const toc = document.getElementById('toc');
  toc.innerHTML="";
  const tabContent = document.getElementById(tabId);
  const summaries = tabContent.querySelectorAll('.article-section details summary');
  summaries.forEach((summary) => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = "javascript:void(0)";
    a.textContent = summary.parentElement.getAttribute('data-toc') || summary.textContent;
    a.addEventListener('click', () => {
      const details = summary.parentElement;
      details.open = true;
      const rect = details.getBoundingClientRect();
      const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      const bannerHeight = document.querySelector('.top-banner')?.offsetHeight || 0;
      window.scrollTo({ top: rect.top + scrollTop - bannerHeight - 10, behavior: 'smooth' });
    });
    li.appendChild(a);
    toc.appendChild(li);
  });
}

// 页面加载时打开 hash 对应 tab
const hash = location.hash.replace("#","");
if(hash && document.getElementById(hash)){ openTab(hash); } else { openTab("tab1"); }
</script>
