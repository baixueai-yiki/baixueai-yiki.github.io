<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>萝卜的博客</title>
  <style>
    /* 顶图 */
    .top-banner {
      width: 100%;
      height: 300px;
      background-image: url('Content/Images/qing.jpg'); /* 这里就是你的图片路径 */
      background-size: cover;
      background-position: center;
      margin-bottom: 20px;
    }

    /* 折叠按钮样式 */
    .collapsible {
      background-color: #f0f0f0;
      color: #333;
      cursor: pointer;
      padding: 15px;
      width: 100%;
      border: none;
      text-align: left;
      outline: none;
      font-size: 18px;
      margin-bottom: 5px;
    }

    .collapsible:hover {
      background-color: #ddd;
    }

    /* 折叠内容样式 */
    .content {
      padding: 0 15px;
      display: none;
      overflow: hidden;
      background-color: #fafafa;
      border: 1px solid #ddd;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <!-- 顶图 -->
  <div class="top-banner"></div>

  <!-- 折叠栏目 -->
  <button class="collapsible">一</button>
  <div class="content">
    <p>这里是一栏的内容，可以写文字、图片等。</p>
  </div>

  <button class="collapsible">二</button>
  <div class="content">
    <p>这里是二栏的内容，可以随意添加信息。</p>
  </div>

  <button class="collapsible">三</button>
  <div class="content">
    <p>这里是三栏的内容，可以写你的博客文章或作品展示。</p>
  </div>

  <button class="collapsible">四</button>
  <div class="content">
    <p>这里是四栏的内容，保持页面整洁，同一页切换。</p>
  </div>

  <script>
    const collapsibles = document.querySelectorAll(".collapsible");
    collapsibles.forEach(btn => {
      btn.addEventListener("click", function() {
        this.classList.toggle("active");
        const content = this.nextElementSibling;
        if (content.style.display === "block") {
          content.style.display = "none";
        } else {
          content.style.display = "block";
        }
      });
    });
  </script>

</body>
</html>
